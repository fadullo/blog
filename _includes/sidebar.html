<aside class="side">
  <img class="avatar" src="{{ site.avatar | relative_url }}" alt="{{ site.author | escape }}">
  <p><strong>{{ site.author }}</strong></p>
  <p>{{ site.description }}</p>

  <strong>Socials</strong>
  <ul class="links">
    {%- for link in site.social_links -%}
      <li>
        <a href="{{ link.user_url }}">
          <i class="fa-brands fa-{{ link.platform | lowercase }}" aria-hidden="true"></i>
          {{ link.platform | capitalize }}
        </a>
      </li>
    {%- endfor -%}
  </ul>

  <hr>
  {%- include header.html -%}
</aside>
